<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entity</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; width: 100vw; height: 100vh; overflow: hidden; cursor: none; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  #controls {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 10;
  }
  button {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.45); padding: 6px 16px; border-radius: 20px;
    font-family: monospace; font-size: 10px; cursor: none; letter-spacing: 0.12em; transition: all 0.25s;
  }
  button:hover { background: rgba(255,255,255,0.08); color: #fff; }
  button.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); color: #fff; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <button class="active" onclick="setMode('white',this)">WHITE</button>
  <button onclick="setMode('purple',this)">PURPLE</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, CX, CY;
let mode = 'white';
let t = 0;

const mouse = { x: null, y: null, active: false, vx: 0, vy: 0, px: 0, py: 0 };
window.addEventListener('mousemove', e => {
  mouse.vx = e.clientX - (mouse.x || e.clientX);
  mouse.vy = e.clientY - (mouse.y || e.clientY);
  mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
});
window.addEventListener('mouseleave', () => { mouse.active = false; });

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W/2; CY = H/2;
}
resize();
window.addEventListener('resize', resize);
window.setMode = (m, el) => {
  mode = m;
  document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
};

// ── Noise ─────────────────────────────────────────────────────────
function h(n) { return (Math.sin(n*127.1+311.7)*43758.5453)%1; }
function fade(t) { return t*t*(3-2*t); }
function lerp(a,b,t) { return a+(b-a)*t; }
function vnoise(x,y,z) {
  const ix=Math.floor(x),iy=Math.floor(y),iz=Math.floor(z);
  const fx=fade(x-ix),fy=fade(y-iy),fz=fade(z-iz);
  return lerp(
    lerp(lerp(h(ix+iy*57+iz*113),h(ix+1+iy*57+iz*113),fx),
         lerp(h(ix+(iy+1)*57+iz*113),h(ix+1+(iy+1)*57+iz*113),fx),fy),
    lerp(lerp(h(ix+iy*57+(iz+1)*113),h(ix+1+iy*57+(iz+1)*113),fx),
         lerp(h(ix+(iy+1)*57+(iz+1)*113),h(ix+1+(iy+1)*57+(iz+1)*113),fx),fy),
    fz);
}
function fbm(x,y,z) {
  return vnoise(x,y,z)*0.5+vnoise(x*2.1+3.7,y*2.1,z*2.1)*0.25+vnoise(x*4.2,y*4.2+1.3,z*4.2)*0.125;
}

// ── Breathing ─────────────────────────────────────────────────────
function getPulse(T) {
  return 0.82+(Math.sin(T*0.95)*0.5+0.5)*0.22+Math.sin(T*2.1+0.8)*0.12+Math.sin(T*0.31)*0.07;
}
function getRipple(theta,phi,T) {
  return Math.sin(theta*2.8+T*1.4)*0.09+Math.cos(phi*1.6+T*1.1)*0.07+Math.sin(theta*1.2-phi*0.9+T*0.8)*0.055;
}
function getBodyDrift(T) {
  return {
    x: Math.sin(T*0.34)*0.06+Math.sin(T*0.71)*0.03,
    y: Math.cos(T*0.27)*0.05+Math.cos(T*0.58)*0.025,
    z: Math.sin(T*0.19)*0.04,
  };
}

// ── Particle ──────────────────────────────────────────────────────
class Particle {
  constructor() {
    this.theta = Math.acos(2*Math.random()-1);
    this.phi   = Math.random()*Math.PI*2;
    this.baseR = 0.68+Math.random()*0.42;
    this.size  = 0.7+Math.random()*1.5;
    this.noiseOff = Math.random()*100;
    // Much faster drift — light and airy
    this.driftSpeed = 0.0005+Math.random()*0.0004;
    this.personalPhase = Math.random()*Math.PI*2;
    this.x=0; this.y=0; this.z=0;
    this.currentR = this.baseR;
    // Screen-space repulsion velocity — independent of 3D position
    this.rx = 0; this.ry2 = 0; // repulsion offset in screen px
  }

  update(T) {
    // Faster noise sampling — more lively surface drift
    const nx = fbm(this.theta*1.3+this.noiseOff, this.phi*0.9, T*0.18);
    const ny = fbm(this.phi*1.1+this.noiseOff*0.5, T*0.15, this.theta);
    this.theta += (nx-0.5)*this.driftSpeed*2.5;
    this.phi   += (ny-0.5)*this.driftSpeed*3.2;
    this.theta  = Math.max(0.04,Math.min(Math.PI-0.04,this.theta));

    const pulse  = getPulse(T+this.personalPhase*0.04);
    const ripple = getRipple(this.theta,this.phi,T);
    const warp   = (fbm(this.theta*2+this.noiseOff,this.phi*1.5,T*0.09)-0.5)*0.28;
    const targetR = (this.baseR+warp)*pulse+ripple;
    // Snappier radius update — less lag
    this.currentR += (targetR-this.currentR)*0.18;

    const drift = getBodyDrift(T);
    this.x = this.currentR*Math.sin(this.theta)*Math.cos(this.phi)+drift.x;
    this.y = this.currentR*Math.cos(this.theta)*0.80+drift.y;
    this.z = this.currentR*Math.sin(this.theta)*Math.sin(this.phi)+drift.z;

    // Repulsion velocity decays quickly — light, not sticky
    this.rx *= 0.72;
    this.ry2 *= 0.72;
  }

  project() {
    const ry = t*0.00065+Math.sin(t*0.00028)*0.15;
    const rx = Math.sin(t*0.00029)*0.26+0.17;
    const px  = this.x*Math.cos(ry)-this.z*Math.sin(ry);
    const pz0 = this.x*Math.sin(ry)+this.z*Math.cos(ry);
    const py2 = this.y*Math.cos(rx)-pz0*Math.sin(rx);
    const pz2 = this.y*Math.sin(rx)+pz0*Math.cos(rx);
    const scale = Math.min(W,H)*0.295;
    const s = 3.6/(3.6+pz2+1.3);
    return {
      sx: CX+px*s*scale + this.rx,
      sy: CY-py2*s*scale + this.ry2,
      depth: pz2, sc: s,
    };
  }
}

const N = 2000;
const particles = Array.from({length:N},()=>new Particle());
for (let i=0;i<80;i++){const TT=i*0.001;particles.forEach(p=>p.update(TT));}

// ── Repulsion ─────────────────────────────────────────────────────
// Small radius, organic: each particle gets an impulse with slight
// angular variation so they scatter in slightly different directions
// rather than perfectly radially — feels alive not mechanical

const REPULSE_R = 42; // small, precise
const REPULSE_R_SQ = REPULSE_R*REPULSE_R;

function applyRepulsion(T) {
  if (!mouse.active || mouse.x===null) return;
  const speed = Math.sqrt(mouse.vx*mouse.vx+mouse.vy*mouse.vy);

  for (let i=0;i<N;i++) {
    const p = particles[i];
    // Use projected position for screen-space repulsion
    const proj = p.project();
    const dx = proj.sx - mouse.x;
    const dy = proj.sy - mouse.y;
    const dSq = dx*dx+dy*dy;
    if (dSq > REPULSE_R_SQ || dSq < 0.1) continue;

    const dist = Math.sqrt(dSq);
    // Sharp falloff — only very close particles react, clearly
    const falloff = Math.pow(1-dist/REPULSE_R, 1.8);

    // Organic scatter: add a small noise-based angular twist
    // so particles don't all flee in a perfect ring
    const twist = (fbm(p.theta*2, p.phi*1.5, T*0.3)-0.5)*0.8; // radians
    const baseAngle = Math.atan2(dy, dx);
    const angle = baseAngle + twist;

    const impulse = falloff * (18 + speed * 0.4);
    p.rx += Math.cos(angle) * impulse;
    p.ry2 += Math.sin(angle) * impulse;
  }
}

// ── Glow ──────────────────────────────────────────────────────────
function drawGlow(T) {
  const pulse = getPulse(T);
  const drift = getBodyDrift(T);
  const ox=drift.x*Math.min(W,H)*0.3, oy=drift.y*Math.min(W,H)*0.3;
  const r=Math.min(W,H)*0.31*pulse;
  const g=ctx.createRadialGradient(CX+ox,CY+oy,0,CX+ox,CY+oy,r);
  if (mode==='white') {
    g.addColorStop(0,'rgba(255,255,255,0.07)');
    g.addColorStop(0.35,'rgba(235,238,255,0.028)');
    g.addColorStop(0.7,'rgba(210,218,255,0.009)');
    g.addColorStop(1,'rgba(0,0,0,0)');
  } else {
    g.addColorStop(0,'rgba(168,128,255,0.09)');
    g.addColorStop(0.4,'rgba(98,68,248,0.03)');
    g.addColorStop(1,'rgba(0,0,0,0)');
  }
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

function drawCursor() {
  if (!mouse.active||mouse.x===null) return;
  ctx.beginPath(); ctx.arc(mouse.x,mouse.y,1.8,0,Math.PI*2);
  ctx.fillStyle = mode==='white'?'rgba(255,200,80,1)':'rgba(80,255,200,1)';
  ctx.fill();
}

function draw() {
  const T = t*0.001;

  applyRepulsion(T);

  ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fillRect(0,0,W,H);
  drawGlow(T);

  const projected=[];
  for (let i=0;i<N;i++){particles[i].update(T);projected.push(particles[i].project());}

  // Connections
  const MAX_D=26,MAX_D_SQ=MAX_D*MAX_D;
  for (let i=0;i<N;i+=2){
    const a=projected[i];
    for (let j=i+1;j<N;j+=2){
      const b=projected[j];
      const dx=b.sx-a.sx,dy=b.sy-a.sy,dSq=dx*dx+dy*dy;
      if (dSq>MAX_D_SQ) continue;
      const distFade=1-Math.sqrt(dSq)/MAX_D;
      const depthAlpha=Math.max(0,0.52-(a.depth+b.depth)*0.17);
      const alpha=distFade*depthAlpha*0.52;
      if (alpha<0.012) continue;
      ctx.beginPath();ctx.moveTo(a.sx,a.sy);ctx.lineTo(b.sx,b.sy);
      ctx.strokeStyle=mode==='white'?`rgba(255,255,255,${alpha.toFixed(3)})`:`rgba(188,158,255,${alpha.toFixed(3)})`;
      ctx.lineWidth=0.32;ctx.stroke();
    }
  }

  // Particles
  for (let i=0;i<N;i++){
    const p=projected[i],pt=particles[i];
    const depthFade=Math.max(0,0.85-p.depth*0.42);
    const sz=pt.size*p.sc*depthFade;
    if (sz<0.12) continue;
    const lum=depthFade*(0.55+p.sc*0.45);
    if (mode==='white'){
      ctx.beginPath();ctx.arc(p.sx,p.sy,sz*0.65,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${(lum*0.92).toFixed(3)})`;ctx.fill();
      if (lum>0.4){
        const gr=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,sz*2.8);
        gr.addColorStop(0,`rgba(255,255,255,${(lum*0.22).toFixed(3)})`);
        gr.addColorStop(1,'rgba(255,255,255,0)');
        ctx.beginPath();ctx.arc(p.sx,p.sy,sz*2.8,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
      }
    } else {
      ctx.beginPath();ctx.arc(p.sx,p.sy,sz*0.65,0,Math.PI*2);
      ctx.fillStyle=`rgba(205,175,255,${(lum*0.92).toFixed(3)})`;ctx.fill();
      if (lum>0.4){
        const gr=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,sz*2.8);
        gr.addColorStop(0,`rgba(185,148,255,${(lum*0.26).toFixed(3)})`);
        gr.addColorStop(1,'rgba(120,88,255,0)');
        ctx.beginPath();ctx.arc(p.sx,p.sy,sz*2.8,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
      }
    }
  }

  drawCursor();
  t++;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
